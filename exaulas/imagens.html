<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imagens</title>
  </head>
  <body>
    <h1>Imagens</h1>
    <!--Não colocar altura e largura no mesmo arquivo-->
    <!--se houver imagem de corativa deixar o alt="" pois, o software entende que é imagem decorativa-->
    <img
      src="../img/camisa.jpg"
      width="100"
      alt="Camiseta Branca"
      loading="lazy"
    />
    <br /><br />
    <figure>
      <img
        src="../img/planet.jpg"
        width="100"
        loading="lazy"
        alt="Luminaria do Planeta Sartuno"
      />
    </figure>
    <br />

    <figure>
      <img src="../img/iphone.jpg" width="100" />
      <figcaption>Iphone 17 Pro Max Laraja</figcaption>
    </figure>

    <h1>Videos</h1>

    <video controls width="400" muted loop>
      <!-- autoplay O video/audio começa automaticamente-->
      <!--muted deixa o video/audio mutado-->
      <!--loop deixa o video/audio rodando em loop-->
      <!--poster imagem do video antes de dar o play,é ideal que a imagem tenha o mesmo tamanho/resolução do video, não é ideal usar junto do autoplay-->
      <source src="../video/video.mp4" type="video/mp4" />
      Seu navegador não suporta a reprodução de video.
    </video>
    <h1>Iframe youtube</h1>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/Bt1AGCual7Q?si=Jpw3HfexT6KHfb6J"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>

    <h1>iframe googlemaps</h1>
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3675.0860050504857!2d-43.198323300000006!3d-22.9101984!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x997f0c4e687185%3A0x973c7a140b9b61fa!2sEdif%C3%ADcio%20Eco%20Sapuca%C3%AD!5e0!3m2!1spt-BR!2sbr!4v1783607208181!5m2!1spt-BR!2sbr"
      width="400"
      height="300"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
  </body>
</html>
